# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  BIN: ./node_modules/.bin/

tasks:
  check-types:
    desc: Check types
    cmds:
      - '{{.BIN}}tsc --noEmit'
    silent: false

  lint:
    desc: Run linter
    cmds:
      - '{{.BIN}}oxlint .'
    silent: false

  lint-fix:
    desc: Run linter with auto-fix
    cmds:
      - '{{.BIN}}oxlint . --fix'
    silent: false

  check-formatting:
    desc: Check formatting
    cmds:
      - '{{.BIN}}oxfmt . --check'
    silent: false

  check-all:
    desc: Run all checks
    cmds:
      - task: check-types
      - task: lint
      - task: check-formatting
    silent: false

  compile:
    desc: Compile the extension
    env:
      NODE_ENV: production
    cmds:
      - '{{.BIN}}tsup'
    silent: false

  format:
    desc: Format code
    cmds:
      - '{{.BIN}}oxfmt . --write'
    silent: false

  unit-tests:
    desc: Run unit tests
    cmds:
      - '{{.BIN}}vitest run src {{.CLI_ARGS}}'
    silent: false

  unit-test-coverage:
    desc: Run unit tests with coverage
    cmds:
      - '{{.BIN}}vitest run src --coverage {{.CLI_ARGS}}'
    silent: false

  extension-tests:
    desc: Run extension tests
    cmds:
      - node test/extension/index.js {{.CLI_ARGS}}
    silent: false

  pull-models:
    desc: Pull required models for integration tests
    cmds:
      - ollama pull smollm:135m
      - ollama pull qwen3:0.6b
      - ollama pull kimi-k2.5:cloud
    silent: false

  integration-tests:
    desc: Run integration tests
    deps: [pull-models]
    cmds:
      - '{{.BIN}}vitest run -c vitest.integration.config.js test/integration {{.CLI_ARGS}}'
    silent: false

  precommit:
    desc: Run pre-commit checks
    deps: [check-types]
    cmds:
      - task: lint-fix
      - task: format
    silent: false

  prerelease:
    desc: Create a pre-release
    deps: [compile]
    cmds:
      - '{{.BIN}}zx ./scripts/release.mjs -- --pre-release -- {{.CLI_ARGS}}'
    silent: false

  release:
    desc: Release the extension
    deps: [compile]
    cmds:
      - '{{.BIN}}zx ./scripts/release.mjs {{.CLI_ARGS}}'
    silent: false

  test-all:
    desc: Run all tests
    cmds:
      - task: unit-tests
      - task: extension-tests
      - task: integration-tests
    silent: false

  test-build-release:
    desc: Test, Build & Release
    deps: [check-all, test-all]
    cmds:
      - task: release
    silent: false

  watch:
    desc: Watch for changes and recompile
    cmds:
      - '{{.BIN}}tsup --watch'
    silent: false

  docs:dev:
    desc: Start documentation development server
    cmds:
      - '{{.BIN}}vitepress dev docs'
    silent: false

  docs:build:
    desc: Build documentation
    cmds:
      - '{{.BIN}}vitepress build'
    silent: false

  docs:preview:
    desc: Preview built documentation
    cmds:
      - '{{.BIN}}vitepress preview docs/.vitepress/dist'
    silent: false
